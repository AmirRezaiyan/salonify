version: "3.9"

services:
  postgres:
    image: postgres:15
    container_name: salonify_postgres
    restart: always
    environment:
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    volumes:
      - postgres_data:/var/lib/postgresql/data/
    ports:
      - "5432:5432"

  redis:
    image: redis:7
    container_name: salonify_redis
    restart: always
    ports:
      - "6379:6379"
    command: ["redis-server", "--appendonly", "yes"]

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: salonify_backend
    command: >
      sh -c "python manage.py migrate &&
             gunicorn common.wsgi:application --bind 0.0.0.0:8000"
    restart: always
    env_file:
      - ./backend/.env
    depends_on:
      - postgres
      - redis
    volumes:
      - ./backend:/app
    ports:
      - "8000:8000"

  celery_worker:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: salonify_celery_worker
    restart: always
    command: celery -A common.celery worker --loglevel=info
    env_file:
      - ./backend/.env
    depends_on:
      - redis
      - backend

volumes:
  postgres_data:
