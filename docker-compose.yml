services:
  postgres:
    image: postgres:15
    container_name: salonify_postgres
    restart: always
    environment:
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"

  redis:
    image: redis:7
    container_name: salonify_redis
    restart: always
    ports:
      - "6379:6379"
    command:
      - redis-server
      - "--appendonly"
      - "yes"
    volumes:
      - redis_data:/data

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: salonify_backend
    env_file:
      - ./.env
    command: >
      sh -c "sleep 5 &&
      python manage.py migrate --noinput &&
      python manage.py collectstatic --noinput &&
      gunicorn salonify_backend.wsgi:application --bind 0.0.0.0:8000"
    restart: on-failure:5
    depends_on:
      - postgres
      - redis
    volumes:
      - ./backend:/app
    ports:
      - "8000:8000"

  celery_worker:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: salonify_celery_worker
    env_file:
      - ./.env
    command: celery -A common.celery worker --loglevel=info
    restart: on-failure:5
    depends_on:
      - postgres
      - redis

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        VITE_API_URL: ${VITE_API_URL:-http://localhost:8000/api}
    container_name: salonify_frontend
    ports:
      - "3000:80"

volumes:
  postgres_data:
  redis_data:
